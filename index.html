<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors 1411</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Rock Paper Scissors</h1>
        <p class="subtitle">Πέτρα - Ψαλίδι - Χαρτί</p>

        <div class="score-board">
            <div>
                <span>Player1</span>
                <strong id="player-score">0</strong>
            </div>
            <div>
                <span>Player2</span>
                <strong id="computer-score">0</strong>
            </div>
        </div>

        <div class="choices">
            <button onclick="playGame('rock')">🪨 Rock</button>
            <button onclick="playGame('paper')">📄 Paper</button>
            <button onclick="playGame('scissors')">✂️ Scissors</button>
        </div>

        <div class="result-box">
            <p id="player-choice">Player choice: -</p>
            <p id="computer-choice">Computer choice: -</p>
            <h2 id="result">Choose an option to start!</h2>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>

        <a class="back-link" href="../../index.html">Επιστροφή στην κεντρική σελίδα</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
